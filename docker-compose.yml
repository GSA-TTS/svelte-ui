services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/workspace
    ports:
      - "6006:6006"  # Storybook
    # Run as root to avoid permission issues with npm install
    user: root
    command: sh -c "npm install && npm run storybook -- --no-open"
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=development
